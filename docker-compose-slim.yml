# this file uses prebuilt image in dockerhub
services:
  jekyll:
    image: amirpourmand/al-folio:slim
    #build: .
    ports:
      - 8080:8080
      - 35729:35729
    volumes:
      - .:/srv/jekyll
      - jekyll_cache:/srv/jekyll/.jekyll-cache
      - tweet_cache:/srv/jekyll/.tweet-cache
    environment:
      - JEKYLL_ENV=development
      - JEKYLL_NO_DISK_CACHE=true

volumes:
  jekyll_cache:
  tweet_cache:
